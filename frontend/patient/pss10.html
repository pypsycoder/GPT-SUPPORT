<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ШВС-10 — GPT Health Support</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="/frontend/patient/css/style.css">
    <link rel="stylesheet" href="/frontend/patient/css/sidebar.css">
    <link rel="stylesheet" href="/frontend/patient/css/global_header.css">
    <link rel="stylesheet" href="/frontend/patient/css/pss10.css">
</head>
<body data-page="pss10">
<div class="page">
    <div id="global-header"></div>

    <div class="layout">
        <div id="sidebar-container"></div>

        <main class="content">
            <section class="page-header">
                <div class="page-title">😰 Шкала воспринимаемого стресса ШВС-10</div>
                <div class="page-subtitle">Ответьте на вопросы о самочувствии за последний месяц. Каждый экран — один вопрос.</div>
            </section>

            <div id="pss10-status" class="status-banner status-hidden"></div>

            <section class="hads-card" aria-live="polite">
                <div class="hads-progress" id="pss10-progress">
                    <div class="hads-progress-text" id="pss10-progress-text">Загружаем вопросы…</div>
                    <div class="hads-progress-bar" aria-hidden="true">
                        <div class="hads-progress-fill" id="pss10-progress-fill"></div>
                    </div>
                </div>

                <div id="pss10-question-container" class="hads-question-container"></div>

                <div id="pss10-result" class="hads-result hidden"></div>
            </section>
        </main>
    </div>

    <footer class="footer">GPT Health Support · Поддержка пациентов</footer>
</div>

<script src="/frontend/patient/js/auth.js"></script>
<script src="/frontend/patient/js/global_header.js"></script>
<script src="/frontend/patient/js/sidebar.js"></script>
<script src="/frontend/patient/js/pss10.js"></script>
</body>
</html>
