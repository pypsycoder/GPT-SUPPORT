<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Опросник Лазаруса (WCQ) — GPT Health Support</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="/frontend/patient/css/style.css">
    <link rel="stylesheet" href="/frontend/patient/css/sidebar.css">
    <link rel="stylesheet" href="/frontend/patient/css/global_header.css">
    <link rel="stylesheet" href="/frontend/patient/css/wcq_lazarus.css">
</head>
<body data-page="wcq_lazarus">
<div class="page">
    <div id="global-header"></div>

    <div class="layout">
        <div id="sidebar-container"></div>

        <main class="content">
            <section class="page-header">
                <div class="page-title">Опросник способов совладания (WCQ)</div>
                <div class="page-subtitle">
                    Вспомните какую-нибудь трудную ситуацию из вашей жизни за последнее время
                    и оцените, как часто вы используете каждый из способов поведения.
                </div>
            </section>

            <div id="wcq-status" class="status-banner status-hidden"></div>

            <section class="hads-card" aria-live="polite">
                <div class="hads-progress" id="wcq-progress">
                    <div class="hads-progress-text" id="wcq-progress-text">Загружаем вопросы…</div>
                    <div class="hads-progress-bar" aria-hidden="true">
                        <div class="hads-progress-fill" id="wcq-progress-fill"></div>
                    </div>
                </div>

                <div class="wcq-period-label" id="wcq-period-label" hidden>
                    Оказавшись в трудной ситуации, я…
                </div>

                <div id="wcq-question-container" class="hads-question-container"></div>

                <div id="wcq-result" class="hads-result hidden"></div>
            </section>
        </main>
    </div>

    <footer class="footer">GPT Health Support · Поддержка пациентов</footer>
</div>

<script src="/frontend/patient/js/auth.js"></script>
<script src="/frontend/patient/js/global_header.js"></script>
<script src="/frontend/patient/js/sidebar.js"></script>
<script src="/frontend/patient/js/wcq_lazarus.js"></script>
</body>
</html>
