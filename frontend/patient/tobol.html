<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ТОБОЛ — GPT Health Support</title>
  <link rel="stylesheet" href="/frontend/patient/css/style.css" />
  <link rel="stylesheet" href="/frontend/patient/css/sidebar.css" />
  <link rel="stylesheet" href="/frontend/patient/css/global_header.css" />
  <link rel="stylesheet" href="/frontend/patient/css/kop25a.css" />
</head>
<body data-page="tobol">
  <div class="page">
    <div id="global-header"></div>

    <div class="layout">
      <div id="sidebar-container"></div>

      <main class="content">
        <section class="page-header">
          <div class="page-title">🧭 ТОБОЛ — тип отношения к болезни</div>
          <div class="page-subtitle">Отвечайте на вопросы по блокам. В каждом блоке выберите не более двух утверждений. Можно не выбирать ни одного, если ничего не подходит. После завершения вы увидите краткий результат.</div>
        </section>

        <div id="tobol-status" class="status-banner status-hidden"></div>

        <section class="scale-card" aria-live="polite">
          <div class="scale-progress">
            <div id="tobol-progress-text" class="scale-progress-text">Загружаем вопросы…</div>
            <div class="scale-progress-bar">
              <div id="tobol-progress-fill" class="scale-progress-fill"></div>
            </div>
          </div>

          <div id="tobol-container" class="scale-questions"></div>

          <div class="scale-nav">
            <button id="tobol-prev" type="button" class="scale-nav-button">Назад</button>
            <button id="tobol-next" type="button" class="scale-nav-button">Далее</button>
            <button id="tobol-submit" type="button" class="scale-nav-button">Готово</button>
          </div>

          <div id="tobol-result" class="kop25a-result-window hidden"></div>
        </section>
      </main>
    </div>

    <footer class="footer">GPT Health Support · Поддержка пациентов</footer>
  </div>

  <script src="/frontend/patient/js/auth.js"></script>
  <script src="/frontend/patient/js/global_header.js"></script>
  <script src="/frontend/patient/js/sidebar.js"></script>
  <script src="/frontend/patient/js/tobol.js"></script>
</body>
</html>
