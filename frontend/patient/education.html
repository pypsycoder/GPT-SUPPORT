<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Обучение — GPT Health Support</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Общие стили пациента (те же, что и для vitals) -->
    <link rel="stylesheet" href="/frontend/patient/css/style.css">
    <link rel="stylesheet" href="/frontend/patient/css/sidebar.css">
    <link rel="stylesheet" href="/frontend/patient/css/global_header.css"></link>
</head>
<body data-page="education">

<div class="page">
        <!-- Глобальный хедер -->
    <div id="global-header"></div>
    <div class="layout">

        <!-- 🔹 Сайдбар теперь подставляется из sidebar.html через JS -->
        <div id="sidebar-container"></div>

        <!-- 🔹 Основной контент -->
        <main class="content">
            <!-- Хедер -->
            <header class="header">
                <div class="header-title">🎓 Обучающие материалы</div>
                <div class="header-sub">
                    Короткие карточки о стрессе, копинге и уходе за собой.
                </div>
            </header>

            <!-- Статус-зона (загрузка / ошибки) -->
            <section id="education-status" class="status-banner status-hidden"></section>

            <!-- Корневая область для карточки урока -->
            <section id="education-root" class="edu-root">
                <!-- Сюда JS подставит текущую карточку -->
            </section>

            <!-- Футер -->
            <footer class="footer">
                GPT Health Support • модуль education • экспериментальный интерфейс
            </footer>
        </main>
    </div>
</div>

<script>
    // ============================
    // API и helpers
    // ============================
    const API_BASE = '/api/v1/education';

    function getPatientTokenFromPath() {
        const parts = window.location.pathname.split('/').filter(Boolean);
        // ожидаем: /p/{patient_token}/education
        if (parts[0] === 'p' && parts.length >= 3) {
            return parts[1];
        }
        return null;
    }

    function getQueryParam(name) {
        const params = new URLSearchParams(window.location.search);
        return params.get(name);
    }

    const patientToken = getPatientTokenFromPath();
    let lessonCode = getQueryParam('lesson');  // теперь это именно Lesson.code

    // ============================
    // Глобальное состояние
    // ============================
    let lessons = [];
    let currentLesson = null;
    let educationItems = [];
    let currentIndex = 0;
    let lessonTestId = null;
    // урок считается "прочитанным", когда пользователь дошёл до последней карточки
    let lessonMarkedRead = false;

    // ============================
    // Отметить урок как "прочитанный"
    // ============================
    async function markLessonAsRead() {
        if (!lessonCode) {
            return;
        }

        if (lessonMarkedRead) {
            return;
        }

        try {
            const resp = await fetch(
                `${API_BASE}/lessons/${encodeURIComponent(lessonCode)}/mark_read`,
                {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/json'
                    },
                    credentials: 'include'
                }
            );

            if (!resp.ok) {
                console.warn('Не удалось отметить урок прочитанным:', resp.status);
                return;
            }

            lessonMarkedRead = true;
            console.debug('Урок помечен прочитанным');
        } catch (error) {
            console.error('Не удалось отметить урок прочитанным:', error);
        }
    }


    // ============================
    // Статус загрузки / ошибок
    // ============================
    function setEducationStatus(type, message) {
        const banner = document.getElementById('education-status');
        if (!banner) return;

        banner.textContent = message || '';
        banner.classList.remove('status-hidden', 'status-success', 'status-error');

        if (!type || type === 'none') {
            banner.classList.add('status-hidden');
            return;
        }

        if (type === 'error') {
            banner.classList.add('status-error');
        } else if (type === 'success') {
            banner.classList.add('status-success');
        }
    }

    // ============================
    // Markdown → HTML
    // ============================
    function markdownToHtml(md) {
        if (!md) return '';

        let text = md.replace(/\r\n/g, '\n');

        // **жирный**
        text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

        // _курсив_  и *курсив*
        text = text
            .replace(/(?<!\*)\*(?!\*)([^*]+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>')
            .replace(/_(.+?)_/g, '<em>$1</em>');

        // [текст](https://...)
        text = text.replace(
            /\[([^\]]+)]\((https?:\/\/[^\s)]+)\)/g,
            '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>'
        );

        const lines = text.split('\n');
        const htmlParts = [];
        let inList = false;

        function closeList() {
            if (inList) {
                htmlParts.push('</ul>');
                inList = false;
            }
        }

        for (const rawLine of lines) {
            const line = rawLine.trimEnd();

            if (!line.trim()) {
                closeList();
                continue;
            }

            // ### заголовки
            if (line.startsWith('### ')) {
                closeList();
                htmlParts.push('<h3>' + line.slice(4).trim() + '</h3>');
                continue;
            }
            if (line.startsWith('## ')) {
                closeList();
                htmlParts.push('<h2>' + line.slice(3).trim() + '</h2>');
                continue;
            }
            if (line.startsWith('# ')) {
                closeList();
                htmlParts.push('<h1>' + line.slice(2).trim() + '</h1>');
                continue;
            }

            // списки
            if (line.startsWith('* ') || line.startsWith('- ')) {
                const itemText = line.slice(2).trim();
                if (!inList) {
                    htmlParts.push('<ul>');
                    inList = true;
                }
                htmlParts.push('<li>' + itemText + '</li>');
                continue;
            }

            // обычный абзац
            closeList();
            htmlParts.push('<p>' + line + '</p>');
        }

        closeList();
        return htmlParts.join('\n');
    }

    // ============================
    // Вытаскиваем заголовок карточки
    // ============================
    function getCardTitle(md) {
        if (!md) return '';
        const lines = md.split(/\r?\n/);

        for (const line of lines) {
            const trimmed = line.trim();
            if (trimmed.startsWith('## ')) {
                let title = trimmed.slice(3).trim();
                title = title.replace(/^\*\*(.+)\*\*$/, '$1');
                title = title.replace(/^__(.+)__$/, '$1');
                return title;
            }
        }

        // запасной вариант — первая непустая строка
        for (const line of lines) {
            const t = line.trim();
            if (t) {
                let title = t.replace(/^\*\*(.+)\*\*$/, '$1')
                    .replace(/^__(.+)__$/, '$1');
                return title;
            }
        }
        return '';
    }

    // ============================
    // Тело карточки без первого "## ..."
    // ============================
    function getCardBodyMd(md) {
        if (!md) return '';
        const lines = md.split(/\r?\n/);

        let firstHeadingIndex = -1;
        for (let i = 0; i < lines.length; i++) {
            if (lines[i].trim().startsWith('## ')) {
                firstHeadingIndex = i;
                break;
            }
        }

        if (firstHeadingIndex === -1) {
            return md;
        }

        const rest = lines.slice(firstHeadingIndex + 1);
        return rest.join('\n').trim();
    }

    // ============================
    // Загрузка test_id для урока
    // ============================
    async function loadLessonTestInfo() {
        lessonTestId = null;
        if (!lessonCode) return;

        try {
            const resp = await fetch(`${API_BASE}/lessons/${encodeURIComponent(lessonCode)}/test`, {
                credentials: 'include'
            });
            if (!resp.ok) {
                return;
            }
            const data = await resp.json();
            if (data && data.test_id) {
                lessonTestId = data.test_id;
            }
        } catch (err) {
            console.warn('Не удалось получить информацию о тесте:', err);
        }
    }

    // ============================
    // Рендер текущей карточки
    // ============================
    function renderCurrentCard() {
    const root = document.getElementById('education-root');
    if (!root) return;

    root.innerHTML = '';

    if (!educationItems || educationItems.length === 0) {
        setEducationStatus('error', 'Для этого урока пока нет карточек.');
        return;
    }

    const item = educationItems[currentIndex];
    const total = educationItems.length;

    const wrapper = document.createElement('article');
    wrapper.className = 'edu-topic-card edu-single-card';

    // markdown карточки
    const cardMd =
        item.content ||
        item.content_md ||
        item.markdown ||
        item.text ||
        '';

    // заголовок урока
    if (currentLesson) {
        const lessonTitle = document.createElement('div');
        lessonTitle.className = 'edu-lesson-title';
        lessonTitle.textContent = currentLesson.title || 'Урок';
        wrapper.appendChild(lessonTitle);
    }

    // заголовок карточки
    let cardTitleText = item.title ? item.title : getCardTitle(cardMd);
    if (cardTitleText) {
        const h2 = document.createElement('h2');
        h2.className = 'edu-card-title';
        h2.textContent = cardTitleText;
        wrapper.appendChild(h2);
    }

    // тело карточки
    const bodyMd = getCardBodyMd(cardMd);
    const contentDiv = document.createElement('div');
    contentDiv.className = 'edu-item-content';
    contentDiv.innerHTML = markdownToHtml(bodyMd);
    wrapper.appendChild(contentDiv);

    // прогресс-бар
    const progressBar = document.createElement('div');
    progressBar.className = 'edu-progress-bar';

    for (let i = 0; i < total; i++) {
        const segment = document.createElement('div');
        segment.className = 'edu-progress-segment';
        if (i <= currentIndex) {
            segment.classList.add('edu-progress-segment--active');
        }
        progressBar.appendChild(segment);
    }
    wrapper.appendChild(progressBar);

    const progressText = document.createElement('div');
    progressText.className = 'edu-progress-text';
    progressText.textContent = `Карточка ${currentIndex + 1} из ${total}`;
    wrapper.appendChild(progressText);

    // === 🔥 ВАЖНО: отмечаем урок прочитанным только на последней карточке ===
    const isLastCard = currentIndex === total - 1;
    if (isLastCard) {
        // флаг проверяется и выставляется внутри markLessonAsRead
        markLessonAsRead();
    }

    // навигация
    const nav = document.createElement('div');
    nav.className = 'edu-nav';

    const prevBtn = document.createElement('button');
    prevBtn.textContent = '← Назад';
    prevBtn.className = 'edu-nav-btn';
    prevBtn.disabled = currentIndex === 0;
    prevBtn.addEventListener('click', () => {
        if (currentIndex > 0) {
            currentIndex -= 1;
            renderCurrentCard();
        }
    });

    const nextBtn = document.createElement('button');
    nextBtn.textContent = 'Вперёд →';
    nextBtn.className = 'edu-nav-btn';
    nextBtn.disabled = isLastCard;
    nextBtn.addEventListener('click', () => {
        if (!isLastCard) {
            currentIndex += 1;
            renderCurrentCard();
        }
    });

    nav.appendChild(prevBtn);
    nav.appendChild(nextBtn);
    wrapper.appendChild(nav);

    // кнопка "Назад к обучению"
    const backBlock = document.createElement('div');
    backBlock.className = 'edu-back-block';

    const backBtn = document.createElement('button');
    backBtn.textContent = '← Назад к обучению';
    backBtn.className = 'edu-nav-btn edu-nav-btn--secondary';
    backBtn.addEventListener('click', () => {
        if (patientToken) {
            window.location.href =
                `/patient/education_overview`;
        } else {
            window.location.href = '/patient/education_overview';
        }
    });

    backBlock.appendChild(backBtn);
    wrapper.appendChild(backBlock);

    // кнопка "Пройти тест" — только на последней карточке и если тест есть
    if (isLastCard && lessonTestId && patientToken) {
        const testBlock = document.createElement('div');
        testBlock.className = 'edu-test-block';

        const testHint = document.createElement('p');
        testHint.className = 'edu-progress-text';
        testHint.textContent = 'Готовы пройти короткий тест по этой теме?';

        const testBtn = document.createElement('button');
        testBtn.className = 'submit-button';
        testBtn.textContent = 'Пройти тест';
        testBtn.addEventListener('click', () => {
            const url =
                `/patient/education_test.html?lesson=${encodeURIComponent(lessonCode)}`;
            window.location.href = url;
        });

        testBlock.appendChild(testHint);
        testBlock.appendChild(testBtn);
        wrapper.appendChild(testBlock);
    }

    root.appendChild(wrapper);
    setEducationStatus('none', '');
}

    // ============================
    // Загрузка урока и карточек
    // ============================
    async function loadEducation() {
        const root = document.getElementById('education-root');
        if (!root) return;

        setEducationStatus('none', '');
        root.innerHTML = '';

        try {
            // 1. грузим список уроков
            const respLessons = await fetch(`${API_BASE}/lessons`, {
                credentials: 'include'
            });
            if (!respLessons.ok) {
                throw new Error('Сервер вернул ошибку при загрузке списка уроков');
            }

            const lessonsData = await respLessons.json();
            if (!Array.isArray(lessonsData) || lessonsData.length === 0) {
                setEducationStatus('error', 'Пока нет доступных уроков.');
                return;
            }

            lessons = lessonsData;

            // выбираем текущий урок по lessonCode или берём первый
            if (lessonCode) {
                currentLesson = lessons.find(l => l.code === lessonCode) || lessons[0];
                lessonCode = currentLesson.code;
            } else {
                currentLesson = lessons[0];
                lessonCode = currentLesson.code;
            }

            // 2. грузим карточки этого урока
            const respCards = await fetch(
                `${API_BASE}/lessons/${encodeURIComponent(lessonCode)}/cards`,
                {
                    credentials: 'include'
                }
            );
            if (!respCards.ok) {
                throw new Error('Ошибка при загрузке карточек урока');
            }
            educationItems = await respCards.json();
            if (!Array.isArray(educationItems) || educationItems.length === 0) {
                setEducationStatus('error', 'Для этого урока пока нет карточек.');
                return;
            }

            // 3. пробуем узнать test_id
            await loadLessonTestInfo();

            currentIndex = 0;
            renderCurrentCard();
        } catch (error) {
            console.error(error);
            setEducationStatus('error', 'Не удалось загрузить обучающие материалы. Попробуйте позже.');
        }
    }

    // ============================
    // Навигация стрелками клавиатуры
    // ============================
    function handleKeyboardNavigation(event) {
        if (!educationItems || educationItems.length === 0) return;

        const target = event.target;
        if (target && (target.tagName === 'INPUT' || target.tagName === 'TEXTAREA')) {
            return;
        }

        if (event.key === 'ArrowRight') {
            if (currentIndex < educationItems.length - 1) {
                currentIndex += 1;
                renderCurrentCard();
            }
        } else if (event.key === 'ArrowLeft') {
            if (currentIndex > 0) {
                currentIndex -= 1;
                renderCurrentCard();
            }
        }
    }

    // ============================
    // Инициализация
    // ============================
    document.addEventListener('DOMContentLoaded', () => {
        loadEducation();
        document.addEventListener('keydown', handleKeyboardNavigation);
    });
</script>

<!-- auth -->
<script src="/frontend/patient/js/auth.js"></script>
<!-- общий сайдбар для всех страниц пациента -->
<script src="/frontend/patient/js/sidebar.js"></script>
<!-- общий header (тот же, что в education / education_test) -->
<script src="/frontend/patient/js/global_header.js"></script>

</body>
</html>
